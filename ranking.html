<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Bottle Battle Ranking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <h1>🏆 Bottle Battle Ranking</h1>

  <div class="podium-box">
    <img src="assets/ranking-bg.png" class="podium-img">

    <div id="top1" class="top top1"></div>
    <div id="top2" class="top top2"></div>
    <div id="top3" class="top top3"></div>
  </div>

  <div class="table-card">
    <h2>อันดับทั้งหมด</h2>

    <table>
      <thead>
        <tr>
          <th>อันดับ</th>
          <th>ห้อง</th>
          <th>น้ำหนักรวม</th>
        </tr>
      </thead>
      <tbody id="rankingTable"></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
