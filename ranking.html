<main class="main">
  <header class="page-title ranking-title">
    <h1>🏆 อันดับห้องเรียน</h1>
    <p>ตารางคะแนนสะสมของแต่ละห้อง</p>
  </header>

  <section class="ranking-card">
   <div class="ranking-scene">
    <img src="assets/ranking-bg.png" class="ranking-image">

    <div class="rank first">
        <span>1</span>
        <h3>ม.4/3</h3>
        <p>85.60 kg</p>
    </div>

    <div class="rank second">
        <span>2</span>
        <h3>ม.5/2</h3>
        <p>80.20 kg</p>
    </div>

    <div class="rank third">
        <span>3</span>
        <h3>ม.6/1</h3>
        <p>75.30 kg</p>
    </div>
</div>

    <div class="ranking-table-box">
      <h3>อันดับ 4 - 10</h3>
      <table>
        <tbody id="rankingTable"></tbody>
      </table>
    </div>

    <div class="school-goal">
      <b>🎯 เป้าหมายทั้งโรงเรียน</b>
      <span id="goalText">กำลังโหลด...</span>
      <div class="goal-bar">
        <div id="goalFill"></div>
      </div>
    </div>
  </section>
</main>
