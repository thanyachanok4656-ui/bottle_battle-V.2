<main class="main">
  <header class="page-title ranking-title">
    <h1>🏆 อันดับห้องเรียน</h1>
    <p>ตารางคะแนนสะสมของแต่ละห้อง</p>
  </header>

  <section class="ranking-card">
    <div class="ranking-scene">
      <div class="rank-label second" id="rank2"></div>
      <div class="rank-label first" id="rank1"></div>
      <div class="rank-label third" id="rank3"></div>
    </div>

    <div class="ranking-table-box">
      <h3>อันดับ 4 - 10</h3>
      <table>
        <tbody id="rankingTable"></tbody>
      </table>
    </div>

    <div class="school-goal">
      <b>🎯 เป้าหมายทั้งโรงเรียน</b>
      <span id="goalText">กำลังโหลด...</span>
      <div class="goal-bar">
        <div id="goalFill"></div>
      </div>
    </div>
  </section>
</main>
